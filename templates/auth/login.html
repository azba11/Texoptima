<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TexOptima</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #f8fafc 0%, #ecfdf5 100%);
    }
    .auth-card {
      width: 100%;
      max-width: 480px;
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--neutral-200);
      padding: 44px 40px 40px;
    }
    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 36px;
    }
    .auth-logo span {
      font-weight: 700;
      font-size: 20px;
      color: var(--neutral-900);
      letter-spacing: -0.02em;
    }
    .auth-heading {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 6px;
    }
    .auth-subtitle {
      color: var(--neutral-400);
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .auth-form .form-group {
      margin-bottom: 20px;
    }
    .auth-form .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--neutral-700);
      margin-bottom: 6px;
    }
    .auth-form .form-control {
      padding: 10px 14px;
      font-size: 14px;
      border-radius: var(--radius);
      border: 1px solid var(--neutral-200);
      background: var(--white);
      transition: var(--transition);
    }
    .auth-form .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(5,150,105,0.1);
    }
    .auth-form .form-control::placeholder {
      color: var(--neutral-300);
    }
    .auth-form .password-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .auth-form .password-header a {
      font-size: 13px;
      font-weight: 500;
      color: var(--primary);
      text-decoration: none;
      transition: var(--transition);
    }
    .auth-form .password-header a:hover {
      color: var(--primary-dark);
    }
    .auth-form .form-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .auth-form .form-check-input {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid var(--neutral-300);
      cursor: pointer;
    }
    .auth-form .form-check-input:checked {
      background-color: var(--primary);
      border-color: var(--primary);
    }
    .auth-form .form-check-label {
      font-size: 14px;
      color: var(--neutral-600);
      cursor: pointer;
    }
    .auth-form .btn-primary {
      padding: 11px 20px;
      font-size: 15px;
      font-weight: 600;
    }
    .auth-footer {
      text-align: center;
      margin-top: 28px;
    }
    .auth-footer span {
      font-size: 14px;
      color: var(--neutral-400);
    }
    .auth-footer a {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      margin-left: 4px;
    }
    .auth-footer a:hover {
      color: var(--primary-dark);
    }
    @media (max-width: 575px) {
      .auth-card {
        padding: 32px 24px 28px;
        border-radius: var(--radius-lg);
      }
      .auth-logo { margin-bottom: 28px; }
      .auth-heading { font-size: 20px; }
      .auth-subtitle { margin-bottom: 24px; }
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="../index.html" class="auth-logo">
        <svg width="34" height="34" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#059669"/><path d="M10 10H22" stroke="white" stroke-width="3" stroke-linecap="round"/><path d="M16 10V23" stroke="white" stroke-width="3" stroke-linecap="round"/><path d="M12 19L15 16L18 18L21 14" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>TexOptima</span>
      </a>
      <h1 class="auth-heading">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account to continue.</p>
      <form class="auth-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" placeholder="you@factory.com" value="abdul@alnoor.com">
        </div>
        <div class="form-group">
          <div class="password-header">
            <label class="form-label" style="margin-bottom:0">Password</label>
            <a href="#">Forgot password?</a>
          </div>
          <input type="password" class="form-control" placeholder="Enter your password" value="password123">
        </div>
        <div class="form-check">
          <input type="checkbox" class="form-check-input" checked id="remember">
          <label class="form-check-label" for="remember">Remember me</label>
        </div>
        <a href="../onboarding/welcome.html" class="btn btn-primary w-100">Sign In</a>
      </form>
      <div class="auth-footer">
        <span>Don't have an account?</span>
        <a href="register.html">Create one</a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
