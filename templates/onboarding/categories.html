<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Up Categories — TexOptima</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .onboarding-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--neutral-50);
      padding: 40px 20px;
    }
    .onboarding-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      border: 1px solid var(--neutral-200);
      box-shadow: var(--shadow-lg);
      padding: 48px;
      max-width: 680px;
      width: 100%;
    }
    .onboarding-progress {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }
    .onboarding-progress .step {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--neutral-200);
      transition: var(--transition);
    }
    .onboarding-progress .step.active { background: var(--primary); width: 28px; border-radius: 5px; }
    .onboarding-progress .step.done { background: var(--primary); }
    .category-option {
      padding: 20px;
      border: 2px solid var(--neutral-200);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      background: var(--white);
      height: 100%;
    }
    .category-option:hover { border-color: var(--primary-light); background: var(--primary-bg); }
    .category-option.selected {
      border-color: var(--primary);
      background: var(--primary-bg);
      box-shadow: 0 0 0 4px rgba(5,150,105,0.1);
    }
    .category-option .cat-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin: 0 auto 12px;
    }
    @media (max-width: 576px) {
      .onboarding-card { padding: 32px 16px; }
    }
  </style>
</head>
<body>
  <div class="onboarding-container">
    <div class="onboarding-card fade-in">
      <div class="onboarding-progress">
        <div class="step done"></div>
        <div class="step active"></div>
        <div class="step"></div>
        <div class="step"></div>
      </div>
      <h4 class="fw-bold mb-2 text-center">What fabrics do you manufacture?</h4>
      <p style="color:var(--neutral-400);font-size:14px;text-align:center;margin-bottom:28px">Select all categories that apply. You can add custom categories too.</p>
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-4">
          <div class="category-option selected" data-category="Lawn">
            <div class="cat-icon bg-primary-light text-primary"><i class="fas fa-leaf"></i></div>
            <div style="font-weight:600;font-size:14px;color:var(--neutral-800)">Lawn</div>
          </div>
        </div>
        <div class="col-6 col-md-4">
          <div class="category-option selected" data-category="Cotton">
            <div class="cat-icon bg-accent-light text-accent"><i class="fas fa-cloud"></i></div>
            <div style="font-weight:600;font-size:14px;color:var(--neutral-800)">Cotton</div>
          </div>
        </div>
        <div class="col-6 col-md-4">
          <div class="category-option selected" data-category="Khaddar">
            <div class="cat-icon" style="background:#f3e8ff;color:#8b5cf6"><i class="fas fa-tshirt"></i></div>
            <div style="font-weight:600;font-size:14px;color:var(--neutral-800)">Khaddar</div>
          </div>
        </div>
        <div class="col-6 col-md-4">
          <div class="category-option" data-category="Denim">
            <div class="cat-icon" style="background:#eef2ff;color:#6366f1"><i class="fas fa-fill-drip"></i></div>
            <div style="font-weight:600;font-size:14px;color:var(--neutral-800)">Denim</div>
          </div>
        </div>
        <div class="col-6 col-md-4">
          <div class="category-option" data-category="Linen">
            <div class="cat-icon bg-warning-light text-warning"><i class="fas fa-wind"></i></div>
            <div style="font-weight:600;font-size:14px;color:var(--neutral-800)">Linen</div>
          </div>
        </div>
        <div class="col-6 col-md-4">
          <div class="category-option" data-category="Silk">
            <div class="cat-icon" style="background:#fdf2f8;color:#ec4899"><i class="fas fa-gem"></i></div>
            <div style="font-weight:600;font-size:14px;color:var(--neutral-800)">Silk</div>
          </div>
        </div>
      </div>
      <div class="d-flex align-items-center gap-3 mb-4">
        <input type="text" class="form-control" placeholder="Add a custom category..." id="customCategory">
        <button class="btn btn-secondary" onclick="addCustomCategory()">Add</button>
      </div>
      <div class="d-flex gap-3 justify-content-between">
        <a href="welcome.html" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Back</a>
        <a href="products.html" class="btn btn-primary">Continue <i class="fas fa-arrow-right"></i></a>
      </div>
    </div>
  </div>
  <script>
    document.querySelectorAll('.category-option').forEach(el => {
      el.addEventListener('click', function() { this.classList.toggle('selected'); });
    });
    function addCustomCategory() {
      const input = document.getElementById('customCategory');
      const val = input.value.trim();
      if (!val) return;
      const container = document.querySelector('.row.g-3');
      const col = document.createElement('div');
      col.className = 'col-6 col-md-4';
      col.innerHTML = '<div class="category-option selected" data-category="' + val + '">' +
        '<div class="cat-icon bg-neutral-100 text-neutral-600"><i class="fas fa-tag"></i></div>' +
        '<div style="font-weight:600;font-size:14px;color:var(--neutral-800)">' + val + '</div></div>';
      col.querySelector('.category-option').addEventListener('click', function() { this.classList.toggle('selected'); });
      container.appendChild(col);
      input.value = '';
    }
  </script>
</body>
</html>
