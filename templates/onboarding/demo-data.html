<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Data — TexOptima</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .onboarding-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--neutral-50);
      padding: 40px 20px;
    }
    .onboarding-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      border: 1px solid var(--neutral-200);
      box-shadow: var(--shadow-lg);
      padding: 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    .onboarding-progress {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }
    .onboarding-progress .step {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--neutral-200);
      transition: var(--transition);
    }
    .onboarding-progress .step.active { background: var(--primary); width: 28px; border-radius: 5px; }
    .onboarding-progress .step.done { background: var(--primary); }
    .demo-option {
      padding: 28px;
      border: 2px solid var(--neutral-200);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      background: var(--white);
    }
    .demo-option:hover { border-color: var(--primary-light); background: var(--primary-bg); }
    .demo-option.selected {
      border-color: var(--primary);
      background: var(--primary-bg);
      box-shadow: 0 0 0 4px rgba(5,150,105,0.1);
    }
  </style>
</head>
<body>
  <div class="onboarding-container">
    <div class="onboarding-card fade-in">
      <div class="onboarding-progress">
        <div class="step done"></div>
        <div class="step done"></div>
        <div class="step done"></div>
        <div class="step active"></div>
      </div>
      <div style="width:72px;height:72px;border-radius:50%;background:var(--primary-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
        <i class="fas fa-database text-primary" style="font-size:30px"></i>
      </div>
      <h4 class="fw-bold mb-2">Explore with Demo Data?</h4>
      <p style="color:var(--neutral-500);font-size:15px;margin-bottom:28px">Would you like to explore TexOptima using realistic demo data? You can always add your own data later.</p>
      <div class="d-flex flex-column gap-3 mb-4">
        <div class="demo-option selected" id="yesOption" onclick="selectOption('yes')">
          <i class="fas fa-check-circle text-primary" style="font-size:24px;margin-bottom:8px;display:block"></i>
          <div style="font-weight:600;font-size:16px;color:var(--neutral-800);margin-bottom:4px">Yes, load demo data</div>
          <div style="font-size:13px;color:var(--neutral-400)">Populate the dashboard with realistic products, sales, and forecasts</div>
        </div>
        <div class="demo-option" id="noOption" onclick="selectOption('no')">
          <i class="fas fa-plus-circle" style="font-size:24px;margin-bottom:8px;display:block;color:var(--neutral-400)"></i>
          <div style="font-weight:600;font-size:16px;color:var(--neutral-800);margin-bottom:4px">No, start fresh</div>
          <div style="font-size:13px;color:var(--neutral-400)">Begin with an empty workspace and add your own data</div>
        </div>
      </div>
      <a href="../dashboard/index.html" class="btn btn-primary btn-lg w-100">Get Started <i class="fas fa-arrow-right"></i></a>
    </div>
  </div>
  <script>
    function selectOption(opt) {
      document.querySelectorAll('.demo-option').forEach(el => el.classList.remove('selected'));
      document.getElementById(opt + 'Option').classList.add('selected');
    }
  </script>
</body>
</html>
