<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — TexOptima</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .onboarding-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--neutral-50);
      padding: 40px 20px;
    }
    .onboarding-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      border: 1px solid var(--neutral-200);
      box-shadow: var(--shadow-lg);
      padding: 48px;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    .onboarding-progress {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }
    .onboarding-progress .step {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--neutral-200);
      transition: var(--transition);
    }
    .onboarding-progress .step.active { background: var(--primary); width: 28px; border-radius: 5px; }
    .onboarding-progress .step.done { background: var(--primary); }
    @media (max-width: 576px) {
      .onboarding-card { padding: 32px 20px; }
    }
  </style>
</head>
<body>
  <div class="onboarding-container">
    <div class="onboarding-card fade-in">
      <div class="onboarding-progress">
        <div class="step active"></div>
        <div class="step"></div>
        <div class="step"></div>
        <div class="step"></div>
      </div>
      <div style="width:80px;height:80px;border-radius:50%;background:var(--primary-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 24px">
        <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#059669"/>
          <path d="M10 10H22" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <path d="M16 10V23" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <path d="M12 19L15 16L18 18L21 14" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2 class="fw-bold mb-2">Welcome to TexOptima</h2>
      <p style="color:var(--neutral-500);font-size:16px;margin-bottom:8px">Let's set up your textile business.</p>
      <div style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--neutral-100);border-radius:100px;font-size:13px;color:var(--neutral-500);margin-bottom:28px">
        <i class="far fa-clock"></i> Takes about 2 minutes
      </div>
      <a href="categories.html" class="btn btn-primary btn-lg" style="padding:14px 40px">Start Setup <i class="fas fa-arrow-right"></i></a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
